<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IDChat — Connect by ID</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --danger: #ff4f6a;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── SCREENS ─── */
  .screen {
    display: none;
    position: relative;
    z-index: 1;
  }
  .screen.active { display: flex; }

  /* ─── AUTH SCREEN ─── */
  #auth-screen {
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 440px;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.5s cubic-bezier(.16,1,.3,1);
  }

  .auth-card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(124,106,255,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .tab-switcher {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: white;
  }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 7px;
    font-family: var(--mono);
  }

  .form-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus {
    border-color: var(--accent);
  }

  .form-group input::placeholder { color: var(--muted); }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .auth-error {
    background: rgba(255,79,106,0.12);
    border: 1px solid rgba(255,79,106,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-top: 12px;
    display: none;
    font-family: var(--mono);
  }

  .auth-error.show { display: block; }

  /* ─── MAIN APP ─── */
  #app-screen {
    min-height: 100vh;
    flex-direction: column;
  }

  /* Top nav */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .nav-logo span { color: var(--accent); }

  .nav-right { display: flex; align-items: center; gap: 16px; }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 7px 14px 7px 7px;
    cursor: default;
  }

  .user-avatar {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .user-info { line-height: 1.2; }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-id { font-size: 11px; color: var(--accent3); font-family: var(--mono); }

  .btn-logout {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* App body layout */
  .app-body {
    display: flex;
    flex: 1;
    height: calc(100vh - 65px);
  }

  /* Sidebar */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  .sidebar-header {
    padding: 20px 20px 0;
  }

  .sidebar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 16px;
  }

  .btn-new-chat {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, rgba(124,106,255,0.15), rgba(255,106,155,0.15));
    border: 1px dashed rgba(124,106,255,0.4);
    border-radius: 10px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .btn-new-chat:hover {
    background: linear-gradient(135deg, rgba(124,106,255,0.25), rgba(255,106,155,0.25));
    border-color: var(--accent);
  }

  .chat-list { flex: 1; overflow-y: auto; padding: 8px; }

  .chat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .chat-item:hover { background: var(--surface2); }
  .chat-item.active { background: rgba(124,106,255,0.12); }

  .chat-avatar {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #0a0a0f;
    flex-shrink: 0;
  }

  .chat-meta { flex: 1; min-width: 0; }
  .chat-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .chat-preview {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: var(--mono);
  }

  .chat-id-tag {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--accent3);
    background: rgba(106,255,212,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  /* Main chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }

  .empty-icon {
    width: 72px; height: 72px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .empty-state h3 { font-size: 20px; font-weight: 700; color: var(--text); }
  .empty-state p { font-size: 14px; max-width: 280px; line-height: 1.6; }

  /* Chat header */
  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(10,10,15,0.8);
    display: none;
  }

  .chat-header.visible { display: flex; }

  .chat-header-avatar {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #0a0a0f;
  }

  .chat-header-info { flex: 1; }
  .chat-header-name { font-size: 15px; font-weight: 700; }
  .chat-header-id { font-size: 12px; color: var(--accent3); font-family: var(--mono); }

  /* Messages */
  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .msg-row {
    display: flex;
    gap: 10px;
    animation: msgIn 0.25s cubic-bezier(.16,1,.3,1);
  }

  .msg-row.sent { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  .msg-row.sent .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  .msg-row.received .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    color: #0a0a0f;
  }

  .msg-bubble {
    max-width: 65%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    position: relative;
    word-break: break-word;
  }

  .msg-row.sent .msg-bubble {
    background: linear-gradient(135deg, var(--accent), #9c6aff);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-row.received .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    font-family: var(--mono);
  }

  .msg-row.received .msg-time { color: var(--muted); }

  .msg-sender {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent3);
    margin-bottom: 3px;
    font-family: var(--mono);
  }

  /* Message input */
  .msg-input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: none;
  }

  .msg-input-area.visible { display: block; }

  .msg-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .msg-input:focus { border-color: var(--accent); }
  .msg-input::placeholder { color: var(--muted); }

  .btn-send {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .btn-send:hover { opacity: 0.9; }
  .btn-send:active { transform: scale(0.95); }
  .btn-send svg { width: 18px; height: 18px; fill: white; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 400px;
    animation: slideUp 0.3s cubic-bezier(.16,1,.3,1);
    position: relative;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .modal-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    font-family: var(--mono);
  }

  .id-input-display {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .id-digit {
    width: 44px; height: 52px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    transition: border-color 0.2s;
  }

  .id-digit.filled { border-color: var(--accent); }

  .id-hidden-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 1px;
    height: 1px;
  }

  .id-input-wrapper {
    position: relative;
    cursor: text;
  }

  .modal-actions { display: flex; gap: 10px; }

  .btn-cancel {
    flex: 1;
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--text); color: var(--text); }

  .btn-connect {
    flex: 2;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-connect:hover { opacity: 0.9; }
  .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; }

  .modal-error {
    background: rgba(255,79,106,0.12);
    border: 1px solid rgba(255,79,106,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 16px;
    font-family: var(--mono);
    display: none;
  }

  .modal-error.show { display: block; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text);
    z-index: 2000;
    transition: transform 0.3s cubic-bezier(.16,1,.3,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(106,255,212,0.4); color: var(--accent3); }
  .toast.error { border-color: rgba(255,79,106,0.4); color: var(--danger); }

  /* ─── LOADING ─── */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .loading-overlay.show { display: flex; }

  .loading-logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .loading-logo span { color: var(--accent); }

  .loading-bar {
    width: 200px; height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0;
    animation: loadFill 1.5s ease-in-out forwards;
    border-radius: 2px;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes loadFill {
    0% { width: 0; }
    60% { width: 75%; }
    100% { width: 100%; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Responsive */
  @media (max-width: 640px) {
    .sidebar { width: 72px; }
    .chat-name, .chat-preview, .chat-id-tag, .sidebar-header .sidebar-title { display: none; }
    .btn-new-chat span { display: none; }
    .btn-new-chat { padding: 12px 8px; }
    .chat-meta { display: none; }
    .topnav { padding: 12px 16px; }
    .user-info { display: none; }
    .messages-container { padding: 16px; }
    .msg-input-area { padding: 12px 16px; }
    .chat-header { padding: 12px 16px; }
    .auth-card { padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-overlay show" id="loading-overlay">
  <div class="loading-logo">ID<span>Chat</span></div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<!-- Auth Screen -->
<div class="screen" id="auth-screen">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-icon">#ID</div>
      <div class="logo-text">ID<span>Chat</span></div>
    </div>

    <div class="tab-switcher">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div class="auth-error" id="login-error"></div>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your Name"/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="choose_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" id="signup-btn" onclick="handleSignup()">Create Account</button>
      <div class="auth-error" id="signup-error"></div>
    </div>
  </div>
</div>

<!-- Main App -->
<div class="screen" id="app-screen">
  <nav class="topnav">
    <div class="nav-logo">ID<span>Chat</span></div>
    <div class="nav-right">
      <div class="user-badge" id="user-badge">
        <div class="user-avatar" id="nav-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="nav-name">—</div>
          <div class="user-id" id="nav-id">#——————</div>
        </div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <div class="app-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Chats</div>
        <button class="btn-new-chat" onclick="openIDModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>ID Chat</span>
        </button>
      </div>
      <div class="chat-list" id="chat-list">
        <!-- chat items populated here -->
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-area">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <h3>No conversation open</h3>
        <p>Click <strong>ID Chat</strong> and enter a 6-digit ID to start chatting with someone.</p>
        <div style="margin-top:8px;font-size:12px;color:var(--accent3);font-family:var(--mono);background:rgba(106,255,212,0.08);border:1px solid rgba(106,255,212,0.2);border-radius:8px;padding:10px 16px;">
          Your ID: <span id="your-id-display">——————</span>
        </div>
      </div>

      <div class="chat-header" id="chat-header">
        <div class="chat-header-avatar" id="header-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="header-name">—</div>
          <div class="chat-header-id" id="header-id">#——————</div>
        </div>
      </div>

      <div class="messages-container" id="messages-container" style="display:none"></div>

      <div class="msg-input-area" id="msg-input-area">
        <div class="msg-input-row">
          <textarea class="msg-input" id="msg-input" placeholder="Type a message…" rows="1"
            onkeydown="handleMsgKeydown(event)" oninput="autoResize(this)"></textarea>
          <button class="btn-send" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ID Chat Modal -->
<div class="modal-overlay" id="id-modal">
  <div class="modal">
    <div class="modal-title">Start a Chat</div>
    <div class="modal-subtitle">Enter the 6-digit ID of the person you want to chat with</div>
    <div class="modal-error" id="modal-error"></div>
    <div class="id-input-wrapper" onclick="document.getElementById('id-hidden-input').focus()">
      <div class="id-input-display">
        <div class="id-digit" id="d0">—</div>
        <div class="id-digit" id="d1">—</div>
        <div class="id-digit" id="d2">—</div>
        <div class="id-digit" id="d3">—</div>
        <div class="id-digit" id="d4">—</div>
        <div class="id-digit" id="d5">—</div>
      </div>
      <input class="id-hidden-input" type="tel" id="id-hidden-input" maxlength="6"
        oninput="handleIDInput(this)" onkeydown="handleIDKeydown(event)"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeIDModal()">Cancel</button>
      <button class="btn-connect" id="connect-btn" onclick="connectByID()" disabled>Connect</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, addDoc, onSnapshot, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBciDEhx1tHfYDkOEJub6Cxqn9wkwM91Vc",
  authDomain: "chat-ebacc.firebaseapp.com",
  projectId: "chat-ebacc",
  storageBucket: "chat-ebacc.firebasestorage.app",
  messagingSenderId: "416660833163",
  appId: "1:416660833163:web:0c7224b6026a984984a58e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ─── State ───────────────────────────────────────────
let currentUser = null;
let activeChat = null;
let unsubMessages = null;
let unsubChats = null;
let chatCache = {};

// ─── Helpers ─────────────────────────────────────────
function generateUID() {
  // range 100000–900000
  return Math.floor(Math.random() * 800001) + 100000;
}

function getChatID(a, b) {
  return [a, b].sort().join('_');
}

function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setLoading(btnId, loading, text = '') {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span>Loading…` : text;
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return d.toLocaleDateString();
}

function formatTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ─── Auth ─────────────────────────────────────────────
window.switchTab = function(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('signup-error').classList.remove('show');
};

window.handleLogin = async function() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');

  if (!username || !password) {
    errEl.textContent = 'Please fill in all fields.';
    return errEl.classList.add('show');
  }

  setLoading('login-btn', true);

  try {
    const userSnap = await getDoc(doc(db, 'users', username));
    if (!userSnap.exists()) {
      errEl.textContent = 'Account not found. Please create one.';
      errEl.classList.add('show');
      return;
    }

    const userData = userSnap.data();
    if (userData.password !== btoa(password)) {
      errEl.textContent = 'Incorrect password.';
      errEl.classList.add('show');
      return;
    }

    currentUser = { username, ...userData };
    localStorage.setItem('idchat_user', username);
    initApp();
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.classList.add('show');
  } finally {
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Sign In';
  }
};

window.handleSignup = async function() {
  const name = document.getElementById('signup-name').value.trim();
  const username = document.getElementById('signup-username').value.trim().toLowerCase();
  const password = document.getElementById('signup-password').value;
  const errEl = document.getElementById('signup-error');
  errEl.classList.remove('show');

  if (!name || !username || !password) {
    errEl.textContent = 'Please fill in all fields.';
    return errEl.classList.add('show');
  }

  if (username.length < 3) {
    errEl.textContent = 'Username must be at least 3 characters.';
    return errEl.classList.add('show');
  }

  if (password.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters.';
    return errEl.classList.add('show');
  }

  if (!/^[a-z0-9_]+$/.test(username)) {
    errEl.textContent = 'Username can only contain letters, numbers, underscores.';
    return errEl.classList.add('show');
  }

  setLoading('signup-btn', true);

  try {
    const existing = await getDoc(doc(db, 'users', username));
    if (existing.exists()) {
      errEl.textContent = 'Username already taken. Try another.';
      errEl.classList.add('show');
      return;
    }

    // Generate unique UID
    let uid;
    let tries = 0;
    do {
      uid = generateUID();
      const uidSnap = await getDocs(query(collection(db, 'users'), where('uid', '==', uid)));
      if (uidSnap.empty) break;
      tries++;
    } while (tries < 20);

    const userData = {
      name,
      username,
      password: btoa(password),
      uid,
      createdAt: serverTimestamp()
    };

    await setDoc(doc(db, 'users', username), userData);

    currentUser = { username, ...userData };
    localStorage.setItem('idchat_user', username);
    showToast(`Account created! Your ID is #${uid}`, 'success');
    initApp();
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.classList.add('show');
  } finally {
    document.getElementById('signup-btn').disabled = false;
    document.getElementById('signup-btn').textContent = 'Create Account';
  }
};

window.handleLogout = function() {
  localStorage.removeItem('idchat_user');
  currentUser = null;
  activeChat = null;
  if (unsubMessages) unsubMessages();
  if (unsubChats) unsubChats();
  chatCache = {};
  document.getElementById('chat-list').innerHTML = '';
  showScreen('auth-screen');
  showToast('Logged out');
};

// ─── App Init ─────────────────────────────────────────
function initApp() {
  showScreen('app-screen');

  document.getElementById('nav-avatar').textContent = getInitials(currentUser.name);
  document.getElementById('nav-name').textContent = currentUser.name;
  document.getElementById('nav-id').textContent = '#' + currentUser.uid;
  document.getElementById('your-id-display').textContent = currentUser.uid;

  loadChats();
  showEmptyState();
}

function showEmptyState() {
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('chat-header').classList.remove('visible');
  document.getElementById('messages-container').style.display = 'none';
  document.getElementById('msg-input-area').classList.remove('visible');
}

// ─── Chats Sidebar ────────────────────────────────────
function loadChats() {
  if (unsubChats) unsubChats();

  const chatsRef = collection(db, 'chats');
  const q = query(chatsRef, where('participants', 'array-contains', currentUser.username));

  unsubChats = onSnapshot(q, snap => {
    const chats = [];
    snap.forEach(d => chats.push({ id: d.id, ...d.data() }));
    chats.sort((a, b) => {
      const ta = a.lastAt?.seconds || 0;
      const tb = b.lastAt?.seconds || 0;
      return tb - ta;
    });
    renderChatList(chats);
  });
}

function renderChatList(chats) {
  const list = document.getElementById('chat-list');
  list.innerHTML = '';

  if (chats.length === 0) {
    list.innerHTML = `<div style="padding:24px 12px;text-align:center;font-size:12px;color:var(--muted);font-family:var(--mono);">No chats yet.<br/>Hit + ID Chat to begin.</div>`;
    return;
  }

  chats.forEach(chat => {
    const otherUsername = chat.participants.find(p => p !== currentUser.username);
    const otherInfo = chat.participantNames?.[otherUsername] || {};
    const name = otherInfo.name || otherUsername;
    const uid = otherInfo.uid || '——';

    const el = document.createElement('div');
    el.className = 'chat-item' + (activeChat?.id === chat.id ? ' active' : '');
    el.innerHTML = `
      <div class="chat-avatar">${getInitials(name)}</div>
      <div class="chat-meta">
        <div class="chat-name">${name}</div>
        <div class="chat-preview">${chat.lastMsg || 'No messages yet'}</div>
      </div>
      <div class="chat-id-tag">#${uid}</div>
    `;
    el.onclick = () => openChat(chat, { username: otherUsername, name, uid });
    list.appendChild(el);
  });
}

// ─── Open Chat ────────────────────────────────────────
async function openChat(chat, otherUser) {
  activeChat = chat;

  // Update active state in sidebar
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  event?.currentTarget?.classList.add('active');

  // Update header
  document.getElementById('header-avatar').textContent = getInitials(otherUser.name);
  document.getElementById('header-name').textContent = otherUser.name;
  document.getElementById('header-id').textContent = '#' + otherUser.uid;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-header').classList.add('visible');
  document.getElementById('messages-container').style.display = 'flex';
  document.getElementById('msg-input-area').classList.add('visible');
  document.getElementById('messages-container').innerHTML = '';

  if (unsubMessages) unsubMessages();

  const msgRef = collection(db, 'chats', chat.id, 'messages');
  const q = query(msgRef, orderBy('createdAt', 'asc'));

  unsubMessages = onSnapshot(q, snap => {
    const container = document.getElementById('messages-container');
    container.innerHTML = '';
    snap.forEach(d => {
      const msg = d.data();
      const isSent = msg.sender === currentUser.username;
      const row = document.createElement('div');
      row.className = 'msg-row ' + (isSent ? 'sent' : 'received');
      row.innerHTML = `
        <div class="msg-avatar">${getInitials(isSent ? currentUser.name : otherUser.name)}</div>
        <div>
          ${!isSent ? `<div class="msg-sender">${otherUser.name}</div>` : ''}
          <div class="msg-bubble">${escapeHTML(msg.text)}</div>
          <div class="msg-time">${formatTime(msg.createdAt)}</div>
        </div>
      `;
      container.appendChild(row);
    });
    container.scrollTop = container.scrollHeight;
  });

  document.getElementById('msg-input').focus();
}

// ─── Send Message ─────────────────────────────────────
window.sendMessage = async function() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeChat) return;

  input.value = '';
  input.style.height = 'auto';

  try {
    const msgRef = collection(db, 'chats', activeChat.id, 'messages');
    await addDoc(msgRef, {
      text,
      sender: currentUser.username,
      createdAt: serverTimestamp()
    });

    await updateDoc(doc(db, 'chats', activeChat.id), {
      lastMsg: text.length > 50 ? text.slice(0, 50) + '…' : text,
      lastAt: serverTimestamp()
    });
  } catch (e) {
    showToast('Failed to send: ' + e.message, 'error');
  }
};

window.handleMsgKeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ─── ID Modal ─────────────────────────────────────────
window.openIDModal = function() {
  document.getElementById('id-modal').classList.add('show');
  document.getElementById('id-hidden-input').value = '';
  document.getElementById('modal-error').classList.remove('show');
  document.getElementById('connect-btn').disabled = true;
  updateIDDisplay('');
  setTimeout(() => document.getElementById('id-hidden-input').focus(), 100);
};

window.closeIDModal = function() {
  document.getElementById('id-modal').classList.remove('show');
};

window.handleIDInput = function(input) {
  const val = input.value.replace(/\D/g, '').slice(0, 6);
  input.value = val;
  updateIDDisplay(val);
  document.getElementById('connect-btn').disabled = val.length < 6;
  document.getElementById('modal-error').classList.remove('show');
};

window.handleIDKeydown = function(e) {
  if (e.key === 'Enter' && document.getElementById('id-hidden-input').value.length === 6) {
    connectByID();
  }
};

function updateIDDisplay(val) {
  for (let i = 0; i < 6; i++) {
    const d = document.getElementById('d' + i);
    d.textContent = val[i] || '—';
    d.classList.toggle('filled', !!val[i]);
  }
}

window.connectByID = async function() {
  const targetUID = parseInt(document.getElementById('id-hidden-input').value);
  const errEl = document.getElementById('modal-error');
  errEl.classList.remove('show');

  if (targetUID < 100000 || targetUID > 900000) {
    errEl.textContent = 'ID must be between 100000 and 900000.';
    return errEl.classList.add('show');
  }

  if (targetUID === currentUser.uid) {
    errEl.textContent = "You can't chat with yourself!";
    return errEl.classList.add('show');
  }

  document.getElementById('connect-btn').disabled = true;
  document.getElementById('connect-btn').innerHTML = '<span class="spinner"></span>Finding…';

  try {
    // Find user by UID
    const usersSnap = await getDocs(query(collection(db, 'users'), where('uid', '==', targetUID)));

    if (usersSnap.empty) {
      errEl.textContent = `No user found with ID #${targetUID}`;
      errEl.classList.add('show');
      document.getElementById('connect-btn').disabled = false;
      document.getElementById('connect-btn').textContent = 'Connect';
      return;
    }

    const targetUser = usersSnap.docs[0].data();
    const chatID = getChatID(currentUser.username, targetUser.username);

    // Create or get chat doc
    const chatRef = doc(db, 'chats', chatID);
    const chatSnap = await getDoc(chatRef);

    if (!chatSnap.exists()) {
      await setDoc(chatRef, {
        participants: [currentUser.username, targetUser.username],
        participantNames: {
          [currentUser.username]: { name: currentUser.name, uid: currentUser.uid },
          [targetUser.username]: { name: targetUser.name, uid: targetUser.uid }
        },
        createdAt: serverTimestamp(),
        lastMsg: '',
        lastAt: serverTimestamp()
      });
    }

    closeIDModal();
    showToast(`Connected with ${targetUser.name}!`, 'success');

    const chatData = chatSnap.exists() ? { id: chatID, ...chatSnap.data() } : {
      id: chatID,
      participants: [currentUser.username, targetUser.username],
      participantNames: {
        [currentUser.username]: { name: currentUser.name, uid: currentUser.uid },
        [targetUser.username]: { name: targetUser.name, uid: targetUser.uid }
      }
    };

    openChat(chatData, { username: targetUser.username, name: targetUser.name, uid: targetUser.uid });
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.classList.add('show');
    document.getElementById('connect-btn').disabled = false;
    document.getElementById('connect-btn').textContent = 'Connect';
  }
};

// ─── Utils ────────────────────────────────────────────
function escapeHTML(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/\n/g, '<br>');
}

// ─── Session Restore ──────────────────────────────────
async function restoreSession() {
  const savedUser = localStorage.getItem('idchat_user');
  if (savedUser) {
    try {
      const snap = await getDoc(doc(db, 'users', savedUser));
      if (snap.exists()) {
        currentUser = { username: savedUser, ...snap.data() };
        initApp();
        return;
      }
    } catch (e) {}
    localStorage.removeItem('idchat_user');
  }
  showScreen('auth-screen');
}

// Close modal on overlay click
document.getElementById('id-modal').addEventListener('click', function(e) {
  if (e.target === this) closeIDModal();
});

// Enter key support for auth
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('signup-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSignup();
});

// ─── Boot ─────────────────────────────────────────────
setTimeout(async () => {
  document.getElementById('loading-overlay').classList.remove('show');
  await restoreSession();
}, 1600);
</script>
